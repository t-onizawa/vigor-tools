<body>
  <div class="container">
    <nav class="breadcrumb">
      <a href="../../">VIGOR TOOLS</a>
      <span class="sep">›</span>
      <a href="../">旅行</a>
      <span class="sep">›</span>
      <span>車中泊の持ち物チェック</span>
    </nav>

    <header class="page-header">
      <h1>車中泊の持ち物チェック</h1>
      <p>出発前に、忘れ物がないか確認しておきたいことをまとめました。</p>
    </header>

    <div class="progress-bar">
      <div class="progress-text">0 / 11 確認済み</div>
      <div class="bar-bg"><div class="bar-fill"></div></div>
    </div>
    <div class="result incomplete">まず寝具まわりから確認しましょう。</div>

    <section class="section">
      <h2 class="section-title">1. 寝具・快適さ</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 寝袋・毛布を用意した</label></li>
        <li><label><input type="checkbox"> 車内用マットや段差解消クッションを用意した</label></li>
        <li><label><input type="checkbox"> 目隠しになるカーテン・サンシェードを用意した</label></li>
        <li><label><input type="checkbox"> 換気方法を確認した</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">2. 電源・灯り</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> モバイルバッテリー・ポータブル電源を用意した</label></li>
        <li><label><input type="checkbox"> 車内用ライトを用意した</label></li>
        <li><label><input type="checkbox"> 充電ケーブル類を忘れずに持った</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">3. 防犯・安全</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 車のドアロック・防犯対策を確認した</label></li>
        <li><label><input type="checkbox"> 緊急連絡先・保険証を持った</label></li>
        <li><label><input type="checkbox"> トイレ・入浴施設の場所を確認した</label></li>
        <li><label><input type="checkbox"> ゴミ・水の処理方法を確認した</label></li>
      </ul>
    </section>

    <button class="reset-btn">チェックをリセット</button>

    <section class="related-tools">
      <h2 class="related-heading">次はこちら</h2>
      <p class="related-sub">今の状況に合わせて、次に使えるツールです。</p>
      <div class="related-list">
        <a class="related-item" href="../car-camping-spot-check/">
          <span class="related-badge">チェックリスト</span>
          <span class="related-name">車中泊スポット選びチェック</span>
          <span class="related-status">→</span>
        </a>
        <a class="related-item" href="../budget/">
          <span class="related-badge">計算</span>
          <span class="related-name">旅行予算シミュレーター</span>
          <span class="related-status">→</span>
        </a>
      </div>
    </section>

    <p class="bookmark-tip">出発前に毎回開くと、忘れ物が減ります。</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
