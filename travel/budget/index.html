<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="旅行にかかる費用を項目ごとに入力し、合計を見える化する。この旅行、いくらまで出せるかを整理する計算ツール。">
  <title>旅行予算シミュレーター — VIGOR TOOLS</title>
  <link rel="stylesheet" href="../../shared.css">
  <link rel="stylesheet" href="style.css">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="VIGOR TOOLS">
  <meta property="og:title" content="旅行予算シミュレーター — VIGOR TOOLS">
  <meta property="og:description" content="旅行にかかる費用を項目ごとに入力し、合計を見える化する。この旅行、いくらまで出せるかを整理する計算ツール。">
  <meta property="og:url" content="https://vigorlab.net/travel/budget/">
  <meta property="og:image" content="https://vigorlab.net/assets/brand/og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="旅行予算シミュレーター — VIGOR TOOLS">
  <meta name="twitter:description" content="旅行にかかる費用を項目ごとに入力し、合計を見える化する。この旅行、いくらまで出せるかを整理する計算ツール。">
  <meta name="twitter:image" content="https://vigorlab.net/assets/brand/og-image.png">
  <link rel="canonical" href="https://vigorlab.net/travel/budget/">
  <link rel="icon" href="/assets/brand/favicon.svg" type="image/svg+xml">
  <link rel="alternate icon" href="/assets/brand/favicon.ico">
  <link rel="apple-touch-icon" href="/assets/brand/apple-touch-icon.png">
  <link rel="manifest" href="/assets/brand/site.webmanifest">
</head>
<body>
  <div class="container">
    <nav class="breadcrumb">
      <a href="../../">VIGOR TOOLS</a>
      <span class="sep">›</span>
      <a href="../">旅行</a>
      <span class="sep">›</span>
      <span>旅行予算シミュレーター</span>
    </nav>

    <header class="page-header">
      <h1>旅行予算シミュレーター</h1>
      <p class="page-desc">項目ごとに入力するだけで、旅行の総額が見えます。</p>
    </header>

    <form id="calc-form" novalidate>
      <div class="field-block">
        <label for="transport-cost">交通費（円）</label>
        <input type="number" id="transport-cost" inputmode="numeric" min="0" placeholder="例：40000">
      </div>
      <div class="field-block">
        <label for="stay-cost">宿泊費（円）</label>
        <input type="number" id="stay-cost" inputmode="numeric" min="0" placeholder="例：30000">
      </div>
      <div class="field-block">
        <label for="activity-cost">現地の食事・アクティビティ予算（円）</label>
        <input type="number" id="activity-cost" inputmode="numeric" min="0" placeholder="例：20000">
      </div>
      <div class="field-block">
        <label for="misc-cost">お土産・予備費（円・任意）</label>
        <input type="number" id="misc-cost" inputmode="numeric" min="0" placeholder="0">
      </div>
      <p class="form-error" id="form-error" hidden>いずれかの項目を入力してください。</p>
      <button type="submit" class="btn-check">計算する</button>
    </form>

    <section class="result-section" id="result-section" hidden>
      <div class="total-box">
        <p class="total-label">旅行費用の合計は</p>
        <p class="total-value"><span id="total-cost">0</span>円</p>
      </div>

      <p class="disclaimer">※入力した項目の合計です。実際の費用と前後する場合があります。</p>

      <div class="history-save" id="history-save-block">
        <button type="button" class="btn-save-history" id="save-history-btn">この結果を判断履歴に残す</button>
      </div>
      <div class="history-saved" id="history-saved-block" hidden>
        <p class="saved-message">この結果を判断履歴に保存しました。</p>
        <a href="/history/" class="history-link">判断履歴を見る →</a>
      </div>

      <button type="button" class="reset-btn" id="reset-btn">もう一度計算する</button>
    </section>

    <section class="related-tools">
      <h2 class="related-heading">次はこちら</h2>
      <p class="related-sub">今の状況に合わせて、次に使えるツールです。</p>
      <div class="related-list">
        <a class="related-item" href="../checklist/">
          <span class="related-badge">チェックリスト</span>
          <span class="related-name">旅行準備チェック</span>
          <span class="related-status">→</span>
        </a>
        <a class="related-item" href="../../money/fixed-cost-check/">
          <span class="related-badge">チェックリスト</span>
          <span class="related-name">固定費チェック</span>
          <span class="related-status">→</span>
        </a>
      </div>
    </section>

    <p class="bookmark-tip">このページをブックマークしておくと、次回もすぐ使えます。</p>
  </div>

  <script src="/shared-history.js"></script>
  <script src="script.js"></script>
</body>
</html>
