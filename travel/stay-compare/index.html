<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="宿泊先2つで迷ったとき、それぞれの決め手を書き出して整理する。判定はせず、比較材料を並べるだけのシート。">
  <title>宿泊先比較シート — VIGOR TOOLS</title>
  <link rel="stylesheet" href="../../shared.css">
  <link rel="stylesheet" href="style.css">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="VIGOR TOOLS">
  <meta property="og:title" content="宿泊先比較シート — VIGOR TOOLS">
  <meta property="og:description" content="宿泊先2つで迷ったとき、それぞれの決め手を書き出して整理する。判定はせず、比較材料を並べるだけのシート。">
  <meta property="og:url" content="https://vigorlab.net/travel/stay-compare/">
  <meta property="og:image" content="https://vigorlab.net/assets/brand/og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="宿泊先比較シート — VIGOR TOOLS">
  <meta name="twitter:description" content="宿泊先2つで迷ったとき、それぞれの決め手を書き出して整理する。判定はせず、比較材料を並べるだけのシート。">
  <meta name="twitter:image" content="https://vigorlab.net/assets/brand/og-image.png">
  <link rel="canonical" href="https://vigorlab.net/travel/stay-compare/">
  <link rel="icon" href="/assets/brand/favicon.svg" type="image/svg+xml">
  <link rel="alternate icon" href="/assets/brand/favicon.ico">
  <link rel="apple-touch-icon" href="/assets/brand/apple-touch-icon.png">
  <link rel="manifest" href="/assets/brand/site.webmanifest">
</head>
<body>
  <div class="container">
    <nav class="breadcrumb">
      <a href="../../">VIGOR TOOLS</a>
      <span class="sep">›</span>
      <a href="../">旅行</a>
      <span class="sep">›</span>
      <span>宿泊先比較シート</span>
    </nav>

    <header class="page-header">
      <h1>宿泊先比較シート</h1>
      <p class="page-desc">判定はしません。2つの宿泊先の決め手を、そのまま書き出すだけです。</p>
    </header>

    <div class="compare-grid">
      <div class="compare-col">
        <label for="stay-a-name">候補A</label>
        <input type="text" id="stay-a-name" placeholder="例：駅前のホテル">
        <textarea id="stay-a-reasons" rows="6" placeholder="良い点・気になる点"></textarea>
      </div>
      <div class="compare-col">
        <label for="stay-b-name">候補B</label>
        <input type="text" id="stay-b-name" placeholder="例：温泉旅館">
        <textarea id="stay-b-reasons" rows="6" placeholder="良い点・気になる点"></textarea>
      </div>
    </div>

    <p class="auto-save-note">入力内容は、このブラウザに自動で保存されます。</p>

    <div class="history-save" id="history-save-block" hidden>
      <button type="button" class="btn-save-history" id="save-history-btn">この内容を判断履歴に残す</button>
    </div>
    <div class="history-saved" id="history-saved-block" hidden>
      <p class="saved-message">この内容を判断履歴に保存しました。</p>
      <a href="/history/" class="history-link">判断履歴を見る →</a>
    </div>

    <section class="related-tools">
      <h2 class="related-heading">次はこちら</h2>
      <p class="related-sub">今の状況に合わせて、次に使えるツールです。</p>
      <div class="related-list">
        <a class="related-item" href="../checklist/">
          <span class="related-badge">チェックリスト</span>
          <span class="related-name">旅行準備チェック</span>
          <span class="related-status">→</span>
        </a>
        <a class="related-item" href="../budget/">
          <span class="related-badge">計算</span>
          <span class="related-name">旅行予算シミュレーター</span>
          <span class="related-status">→</span>
        </a>
      </div>
    </section>

    <p class="bookmark-tip">気持ちが変わるたびに、書き直してかまいません。</p>
  </div>

  <script src="/shared-history.js"></script>
  <script src="script.js"></script>
</body>
</html>
