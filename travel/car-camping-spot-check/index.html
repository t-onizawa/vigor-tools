<body>
  <div class="container">
    <nav class="breadcrumb">
      <a href="../../">VIGOR TOOLS</a>
      <span class="sep">›</span>
      <a href="../">旅行</a>
      <span class="sep">›</span>
      <span>車中泊スポット選びチェック</span>
    </nav>

    <header class="page-header">
      <h1>車中泊スポット選びチェック</h1>
      <p>どこで車中泊するか、確認しておきたいことをまとめました。</p>
    </header>

    <div class="progress-bar">
      <div class="progress-text">0 / 8 確認済み</div>
      <div class="bar-bg"><div class="bar-fill"></div></div>
    </div>
    <div class="result incomplete">まず場所のルールから確認しましょう。</div>

    <section class="section">
      <h2 class="section-title">1. ルール・マナー</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 車中泊が認められている場所か確認した</label></li>
        <li><label><input type="checkbox"> 施設の利用ルール（営業時間・エンジン停止等）を確認した</label></li>
        <li><label><input type="checkbox"> 近隣への騒音・アイドリングに配慮した</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">2. 安全・設備</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 平坦で安全な駐車スペースか確認した</label></li>
        <li><label><input type="checkbox"> トイレ・水道の有無を確認した</label></li>
        <li><label><input type="checkbox"> 周囲の照明・人通りを確認した</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">3. 天候・環境</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 天気予報・気温を確認した</label></li>
        <li><label><input type="checkbox"> 虫・野生動物の対策を考えた</label></li>
      </ul>
    </section>

    <button class="reset-btn">チェックをリセット</button>

    <section class="related-tools">
      <h2 class="related-heading">次はこちら</h2>
      <p class="related-sub">今の状況に合わせて、次に使えるツールです。</p>
      <div class="related-list">

          <span class="related-badge">チェックリスト</span>
          <span class="related-name">車中泊の持ち物チェック</span>
          <span class="related-status">→</span>
        </a>
        <a class="related-item" href="../stay-compare/">
          <span class="related-badge">比較シート</span>
          <span class="related-name">宿泊先比較シート</span>
          <span class="related-status">→</span>
        </a>
      </div>
    </section>

    <p class="bookmark-tip">このページをブックマークしておくと、次回もすぐ使えます。</p>
