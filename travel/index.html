<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel — VIGOR TOOLS</title>
  <link rel="stylesheet" href="../shared.css">
</head>
<body>
  <div class="container">
    <nav class="breadcrumb">
      <a href="../">VIGOR TOOLS</a>
      <span class="sep">›</span>
      <span>Travel</span>
    </nav>
    <header class="page-header">
      <h1>Travel</h1>
      <p>旅行・移動・宿泊の準備を整える</p>
    </header>
    <div class="tools-grid">
      <a class="card" href="./checklist/">
        <div class="card-top"><span class="badge">チェックリスト</span></div>
        <h2 class="card-title">旅行準備チェック</h2>
        <p class="card-desc">出発前に確認したい書類・持ち物・手続きを整理する</p>
        <div class="card-meta">31項目</div>
      </a>
      <div class="card card--coming">
        <div class="card-top"><span class="badge">チェックリスト</span></div>
        <h2 class="card-title">車中泊チェック</h2>
        <p class="card-desc">装備・場所・安全確認を整理する</p>
        <div class="card-meta">準備中</div>
      </div>
      <div class="card card--coming">
        <div class="card-top"><span class="badge">チェックリスト</span></div>
        <h2 class="card-title">キャンプ準備チェック</h2>
        <p class="card-desc">忘れ物なく、快適なキャンプへ</p>
        <div class="card-meta">準備中</div>
      </div>
    </div>
  </div>
