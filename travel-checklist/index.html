<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅行準備チェック — VIGOR TOOLS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">

    <div class="back-link"><a href="../">← VIGOR TOOLS</a></div>

    <header class="header">
      <h1>旅行準備チェック</h1>
      <p>出発前に確認したい書類・持ち物・手続きを整理する</p>
    </header>

    <div class="progress-bar">
      <div class="progress-text">0 / 31 確認済み</div>
      <div class="bar-bg"><div class="bar-fill"></div></div>
    </div>

    <section class="section">
      <h2 class="section-title">1. 書類・証明</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> パスポートの有効期限を確認した</label></li>
        <li><label><input type="checkbox"> ビザが必要か調べた（国内旅行は不要）</label></li>
        <li><label><input type="checkbox"> 国際免許証が必要か確認した</label></li>
        <li><label><input type="checkbox"> 旅行保険証・加入証明を用意した</label></li>
        <li><label><input type="checkbox"> 渡航先の危険情報・外務省の安全情報を確認した</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">2. 交通・宿泊</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 航空券・新幹線など交通手段を予約した</label></li>
        <li><label><input type="checkbox"> 宿泊先を予約した</label></li>
        <li><label><input type="checkbox"> 出発地から空港・駅への交通手段を確認した</label></li>
        <li><label><input type="checkbox"> 現地での移動手段を調べた（電車・バス・タクシー等）</label></li>
        <li><label><input type="checkbox"> チェックイン・チェックアウト時刻を確認した</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">3. お金・カード</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 現地通貨の両替・準備をした</label></li>
        <li><label><input type="checkbox"> 海外対応クレジットカードの限度額を確認した</label></li>
        <li><label><input type="checkbox"> 海外旅行保険に加入した（カード付帯も含む）</label></li>
        <li><label><input type="checkbox"> 渡航先の物価感・予算を把握した</label></li>
        <li><label><input type="checkbox"> 緊急時の連絡先（カード会社・保険会社）を控えた</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">4. スマホ・通信</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 海外ローミングの設定・料金を確認した</label></li>
        <li><label><input type="checkbox"> SIM・Wi-Fiルーターを手配した（必要な場合）</label></li>
        <li><label><input type="checkbox"> 地図・翻訳など必要なアプリをダウンロードした</label></li>
        <li><label><input type="checkbox"> 充電器・変換プラグを用意した</label></li>
        <li><label><input type="checkbox"> モバイルバッテリーを充電した</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">5. 健康・医療</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 常備薬・必要な処方薬を用意した</label></li>
        <li><label><input type="checkbox"> 渡航先で必要なワクチン接種を確認した</label></li>
        <li><label><input type="checkbox"> 持病がある場合、英文診断書を用意した</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">6. 持ち物</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 必要な日数分の着替えを用意した</label></li>
        <li><label><input type="checkbox"> 機内持ち込み制限（液体・刃物等）を確認した</label></li>
        <li><label><input type="checkbox"> 貴重品の管理方法を決めた</label></li>
        <li><label><input type="checkbox"> 帰りの荷物増加を考えてスーツケースに余裕を持たせた</label></li>
        <li><label><input type="checkbox"> 日焼け止め・虫除けなど現地に合わせたグッズを準備した</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">7. 出発前の確認</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 自宅の戸締まり・ガス・水道を確認する段取りをした</label></li>
        <li><label><input type="checkbox"> 郵便・宅配の受け取り方法を決めた</label></li>
        <li><label><input type="checkbox"> 行き先・緊急連絡先を家族・友人に知らせた</label></li>
      </ul>
    </section>

    <div class="result incomplete">あと 31 項目を確認してください</div>
    <button class="reset-btn">リセット</button>

  </div>
  <script src="script.js"></script>
</body>
</html>
