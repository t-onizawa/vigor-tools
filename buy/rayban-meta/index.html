<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ray-Ban Meta 購入前チェックリスト</title>
  <link rel="stylesheet" href="../../shared.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <nav class="breadcrumb">
      <a href="../../">VIGOR TOOLS</a>
      <span class="sep">›</span>
      <a href="../">Buy</a>
      <span class="sep">›</span>
      <span>Ray-Ban Meta 購入前チェック</span>
    </nav>

    <header class="header">
      <h1>Ray-Ban Meta<br>購入前チェックリスト</h1>
      <p>買って後悔しないために、購入前に確認しておきたいこと</p>
    </header>

    <div class="progress-bar">
      <div class="progress-text">0 / 29 確認済み</div>
      <div class="bar-bg"><div class="bar-fill"></div></div>
    </div>

    <section class="section">
      <h2 class="section-title">1. 度入り</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 現在メガネを使用している</label></li>
        <li><label><input type="checkbox"> 度入りレンズはサードパーティ対応が必要なことを知っている</label></li>
        <li><label><input type="checkbox"> 度入り対応の追加費用（目安2〜3万円）を把握している</label></li>
        <li><label><input type="checkbox"> 度なしサングラスとして使うことも許容できる</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">2. レンズ交換</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 純正レンズ交換の選択肢が限られることを知っている</label></li>
        <li><label><input type="checkbox"> サードパーティのレンズ交換サービスを使う意志がある</label></li>
        <li><label><input type="checkbox"> フレームへの傷・劣化はある程度許容できる</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">3. 鼻あて</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> アジア人向け鼻あてパッド（サードパーティ）の存在を知っている</label></li>
        <li><label><input type="checkbox"> 標準の鼻あてでは日本人顔にフィットしにくい場合があることを理解している</label></li>
        <li><label><input type="checkbox"> フィット調整に追加コストがかかることを受け入れられる</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">4. フィット感</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 本体重量（約49g）を把握している</label></li>
        <li><label><input type="checkbox"> 長時間装着での耳・鼻への負担を許容できる</label></li>
        <li><label><input type="checkbox"> 既存のメガネと併用は難しいことを理解している</label></li>
        <li><label><input type="checkbox"> 試着動画やレビューで装着感を事前に確認した</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">5. 利用目的（参考：当てはまるものをチェック）</h2>
      <ul class="checklist checklist--ref">
        <li><label><input type="checkbox"> 写真・動画のハンズフリー撮影がしたい</label></li>
        <li><label><input type="checkbox"> 音楽・Podcastを骨伝導で楽しみたい</label></li>
        <li><label><input type="checkbox"> ハンズフリー通話がしたい</label></li>
        <li><label><input type="checkbox"> AI機能（Meta AI）と連携したい</label></li>
        <li><label><input type="checkbox"> ファッションアイテムとして使いたい</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">6. 日本での期待値</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> Meta AIの音声機能は日本語未対応（または制限あり）であることを知っている</label></li>
        <li><label><input type="checkbox"> Live AIなど一部機能が日本では使えないことを理解している</label></li>
        <li><label><input type="checkbox"> Meta ViewアプリがiOS/Androidで使えることを確認した</label></li>
        <li><label><input type="checkbox"> 日本での公式サポート・修理窓口を把握している</label></li>
        <li><label><input type="checkbox"> 撮影時のLEDインジケーターなどプライバシーマナーを理解している</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">7. 購入前最終確認</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 本体価格＋アクセサリ込みの総予算を把握している</label></li>
        <li><label><input type="checkbox"> 返品・交換ポリシーを確認した</label></li>
        <li><label><input type="checkbox"> 購入できる販路（公式サイト・Amazon等）を確認した</label></li>
        <li><label><input type="checkbox"> 実際のユーザーレビューを複数読んだ</label></li>
        <li><label><input type="checkbox"> 「自分の主な使い方」に合っていると確信できる</label></li>
      </ul>
    </section>

    <div class="result incomplete">あと 29 項目を確認してください</div>
    <button class="reset-btn">最初からやり直す</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
