<body>
  <div class="container">
    <nav class="breadcrumb">
      <a href="../../">VIGOR TOOLS</a>
      <span class="sep">›</span>
      <a href="../">買い物</a>
      <span class="sep">›</span>
      <span>PC購入チェック</span>
    </nav>

    <header class="page-header">
      <h1>PC購入チェック</h1>
      <p>買ってから後悔しないために、確認しておきたいことをまとめました。</p>
    </header>

    <div class="progress-bar">
      <div class="progress-text">0 / 12 確認済み</div>
      <div class="bar-bg"><div class="bar-fill"></div></div>
    </div>
    <div class="result incomplete">まず用途を明確にするところから始めましょう。</div>

    <section class="section">
      <h2 class="section-title">1. 用途</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 主な使用目的を明確にしている（作業・ゲーム・動画編集等）</label></li>
        <li><label><input type="checkbox"> 外出先で使うか、自宅のみで使うか決めている</label></li>
        <li><label><input type="checkbox"> 今のPCで何が不満か具体的に言える</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">2. スペック</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> CPU・メモリ・ストレージの目安を調べた</label></li>
        <li><label><input type="checkbox"> 画面サイズ・重量が用途に合っているか確認した</label></li>
        <li><label><input type="checkbox"> バッテリー駆動時間を確認した</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">3. サポート・保証</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 保証期間・サポート窓口を確認した</label></li>
        <li><label><input type="checkbox"> 故障時のデータバックアップ方法を考えた</label></li>
        <li><label><input type="checkbox"> 延長保証の要否を検討した</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">4. 購入前最終確認</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 予算内に収まっているか確認した</label></li>
        <li><label><input type="checkbox"> 実機レビューを複数読んだ</label></li>
        <li><label><input type="checkbox"> 返品・交換ポリシーを確認した</label></li>
      </ul>
    </section>

    <button class="reset-btn">チェックをリセット</button>

    <section class="related-tools">
      <h2 class="related-heading">次はこちら</h2>
      <p class="related-sub">今の状況に合わせて、次に使えるツールです。</p>
      <div class="related-list">
        <a class="related-item" href="../gadget-check/">
          <span class="related-badge">診断ツール</span>
          <span class="related-name">ガジェット購入チェック</span>
          <span class="related-status">→</span>
        </a>
      </div>
    </section>

    <p class="bookmark-tip">このページをブックマークしておくと、次回もすぐ使えます。</p>
  </div>
