<body>
  <div class="container">
    <nav class="breadcrumb">
      <a href="../../">VIGOR TOOLS</a>
      <span class="sep">›</span>
      <a href="../">お金</a>
      <span class="sep">›</span>
      <span>「元取れてる？」損益分岐点チェック</span>
    </nav>

    <header class="page-header">
      <h1>「元取れてる？」損益分岐点チェック</h1>
      <p class="page-desc">判定はしません。1回あたりのコストを計算するだけです。</p>
    </header>

    <form id="calc-form" novalidate>
      <div class="field-block">
        <label for="monthly-fee">月額料金（円）</label>
        <input type="number" id="monthly-fee" inputmode="numeric" min="0" placeholder="例：8000">
      </div>
      <div class="field-block">
        <label for="usage-count">月の利用回数（回）</label>
        <input type="number" id="usage-count" inputmode="numeric" min="1" placeholder="例：4">
      </div>
      <p class="form-error" id="form-error" hidden>月額料金と利用回数を入力してください。</p>
      <button type="submit" class="btn-check">計算する</button>
    </form>

    <section class="result-section" id="result-section" hidden>
      <div class="total-box">
        <p class="total-label">1回あたりのコストは</p>
        <p class="total-value"><span id="per-use-cost">0</span>円</p>
      </div>

      <p class="disclaimer">この金額を見て、続ける価値があるか考えてみてください。※あくまで参考値です。</p>

      <div class="history-save" id="history-save-block">
        <button type="button" class="btn-save-history" id="save-history-btn">この結果を判断履歴に残す</button>
      </div>
      <div class="history-saved" id="history-saved-block" hidden>
        <p class="saved-message">この結果を判断履歴に保存しました。</p>
        <a href="/history/" class="history-link">判断履歴を見る →</a>
      </div>

      <button type="button" class="reset-btn" id="reset-btn">もう一度計算する</button>
    </section>

    <section class="related-tools">
      <h2 class="related-heading">次はこちら</h2>
      <p class="related-sub">今の状況に合わせて、次に使えるツールです。</p>
      <div class="related-list">
        <a class="related-item" href="../subscriptions/">
          <span class="related-badge">計算</span>
          <span class="related-name">サブスク年間総額計算</span>
          <span class="related-status">→</span>
        </a>
        <a class="related-item" href="../fixed-cost-check/">
          <span class="related-badge">チェックリスト</span>
          <span class="related-name">固定費チェック</span>
          <span class="related-status">→</span>
        </a>
      </div>
    </section>

    <p class="bookmark-tip">このページをブックマークしておくと、次回もすぐ使えます。</p>
  </div>

  <script src="/shared-history.js"></script>
  <script src="script.js"></script>
</body>
</html>
