<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>固定費チェック — VIGOR TOOLS</title>
  <link rel="stylesheet" href="../../shared.css">
  <link rel="stylesheet" href="style.css">
  <!-- OGP -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="VIGOR TOOLS">
  <meta property="og:title" content="固定費チェック — VIGOR TOOLS">
  <meta property="og:description" content="毎月なんとなく払っている支出を見える化し、まずここから見直せばいいを見つける。">
  <meta property="og:url" content="https://t-onizawa.github.io/vigor-tools/money/fixed-cost-check/">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="固定費チェック — VIGOR TOOLS">
  <meta name="twitter:description" content="毎月なんとなく払っている支出を見える化し、まずここから見直せばいいを見つける。">
</head>
<body>
  <div class="container">

    <nav class="breadcrumb">
      <a href="../../">VIGOR TOOLS</a>
      <span> › </span>
      <a href="../">お金</a>
      <span> › </span>
      <span>固定費チェック</span>
    </nav>

    <header class="page-header">
      <h1>固定費チェック</h1>
      <p class="page-desc">毎月なんとなく払っている支出を見える化し、「まずここから見直せばいい」を見つける。</p>
    </header>

    <div class="progress-bar">
      <div class="bar-fill"></div>
    </div>
    <p class="progress-text">0 / 23 確認済み</p>
    <div class="result incomplete">まず把握するところから始めましょう。</div>

    <section class="section">
      <h2 class="section-title">住まい</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 家賃・住宅ローンの月額を把握している</label></li>
        <li><label><input type="checkbox"> 管理費・修繕積立金を把握している</label></li>
        <li><label><input type="checkbox"> 火災保険・地震保険の更新時期を把握している</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">通信</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> スマホ代の月額を把握している</label></li>
        <li><label><input type="checkbox"> 自宅インターネット代を把握している</label></li>
        <li><label><input type="checkbox"> 使っていないオプション契約がないか確認した</label></li>
        <li><label><input type="checkbox"> 格安SIMやプラン変更を検討した</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">保険</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 生命保険の内容と月額を把握している</label></li>
        <li><label><input type="checkbox"> 医療保険の内容と月額を把握している</label></li>
        <li><label><input type="checkbox"> 自動車保険の更新時期を把握している</label></li>
        <li><label><input type="checkbox"> 保険料が今の生活に合っているか確認した</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">サブスク</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 動画配信サービスの月額を把握している</label></li>
        <li><label><input type="checkbox"> 音楽・書籍・アプリ課金を把握している</label></li>
        <li><label><input type="checkbox"> 使っていないサブスクを解約候補に入れた</label></li>
        <li><label><input type="checkbox"> 年払い契約の更新月を確認した</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">車・移動</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 車のローン・リース代を把握している</label></li>
        <li><label><input type="checkbox"> 駐車場代を把握している</label></li>
        <li><label><input type="checkbox"> ガソリン代・高速代の月平均を把握している</label></li>
        <li><label><input type="checkbox"> 車検・税金・保険の年間費用を把握している</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">その他</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> ジム・習い事など月額費用を把握している</label></li>
        <li><label><input type="checkbox"> クレジットカード年会費を確認した</label></li>
        <li><label><input type="checkbox"> 定期購入品の費用を確認した</label></li>
        <li><label><input type="checkbox"> 使っていないサービスを1つ解約候補にした</label></li>
      </ul>
    </section>

    <button class="reset-btn">チェックをリセット</button>

    <section class="memo-section">
      <h2 class="memo-heading">見直し候補メモ</h2>
      <p class="memo-desc">気づいたことをメモしておきましょう。次に開いたときも残っています。</p>

      <div class="memo-field">
        <label class="memo-label" for="memo-today">今月見直すもの</label>
        <textarea id="memo-today" class="memo-textarea" placeholder="例：スマホのオプションを外す"></textarea>
      </div>

      <div class="memo-field">
        <label class="memo-label" for="memo-cancel">解約候補</label>
        <textarea id="memo-cancel" class="memo-textarea" placeholder="例：〇〇動画サービス、△△アプリ"></textarea>
      </div>

      <div class="memo-field">
        <label class="memo-label" for="memo-plan">プラン変更候補</label>
        <textarea id="memo-plan" class="memo-textarea" placeholder="例：スマホを格安SIMに変更、保険の特約を見直す"></textarea>
      </div>

      <div class="memo-field">
        <label class="memo-label" for="memo-next">次回確認日</label>
        <input id="memo-next" class="memo-input" type="text" placeholder="例：2026年8月、来月末">
      </div>

      <button id="memo-clear-btn" class="memo-clear-btn">メモをすべて消去</button>
    </section>

    <section class="related-tools">
      <h2 class="related-heading">関連ツール</h2>
      <div class="related-list">
        <a class="related-item" href="../../work/independence/">
          <span class="related-badge">診断ツール</span>
          <span class="related-name">独立準備チェック</span>
          <span class="related-status">→</span>
        </a>
        <a class="related-item" href="../../life/moving/">
          <span class="related-badge">チェックリスト</span>
          <span class="related-name">引越しチェック</span>
          <span class="related-status">→</span>
        </a>
        <a class="related-item" href="../../thinking/15min-do/">
          <span class="related-badge">思考ツール</span>
          <span class="related-name">15分Do変換ツール</span>
          <span class="related-status">→</span>
        </a>
        <a class="related-item" href="../../work/resignation-check/">
          <span class="related-badge">チェックリスト</span>
          <span class="related-name">退職チェック</span>
          <span class="related-status">→</span>
        </a>
      </div>
    </section>

    <p class="bookmark-tip">毎月の見直し習慣に。このページをブックマークしておくと便利です。</p>

  </div>
  <script src="script.js"></script>
</body>
</html>
