<body>
  <div class="container">
    <nav class="breadcrumb">
      <a href="../../">VIGOR TOOLS</a>
      <span class="sep">›</span>
      <a href="../">お金</a>
      <span class="sep">›</span>
      <span>独立後の固定費見積もり</span>
    </nav>

    <header class="page-header">
      <h1>独立後の固定費見積もり</h1>
      <p class="page-desc">独立すると新しく発生する費用を、項目ごとに入力するだけです。</p>
    </header>

    <form id="calc-form" novalidate>
      <div class="field-block">
        <label for="insurance-cost">国民健康保険・年金（円/月）</label>
        <input type="number" id="insurance-cost" inputmode="numeric" min="0" placeholder="例：40000">
      </div>
      <div class="field-block">
        <label for="tax-reserve">税金の積み立て目安（円/月）</label>
        <input type="number" id="tax-reserve" inputmode="numeric" min="0" placeholder="例：30000">
      </div>
      <div class="field-block">
        <label for="work-tools">仕事道具・サービス（円/月）</label>
        <input type="number" id="work-tools" inputmode="numeric" min="0" placeholder="例：10000">
      </div>
      <div class="field-block">
        <label for="other-costs">その他（円/月・任意）</label>
        <input type="number" id="other-costs" inputmode="numeric" min="0" placeholder="0">
      </div>
      <p class="form-error" id="form-error" hidden>いずれかの項目を入力してください。</p>
      <button type="submit" class="btn-check">計算する</button>
    </form>

    <section class="result-section" id="result-section" hidden>
      <div class="total-box">
        <p class="total-label">独立後の新しい固定費は</p>
        <p class="total-value"><span id="total-cost">0</span>円/月</p>
      </div>

      <p class="disclaimer">※実際の保険料・税額は所得や自治体によって変わります。目安としてご利用ください。</p>

      <div class="history-save" id="history-save-block">
        <button type="button" class="btn-save-history" id="save-history-btn">この結果を判断履歴に残す</button>
      </div>
      <div class="history-saved" id="history-saved-block" hidden>
        <p class="saved-message">この結果を判断履歴に保存しました。</p>
        <a href="/history/" class="history-link">判断履歴を見る →</a>
      </div>

      <button type="button" class="reset-btn" id="reset-btn">もう一度計算する</button>
    </section>

    <section class="related-tools">
      <h2 class="related-heading">次はこちら</h2>
      <p class="related-sub">今の状況に合わせて、次に使えるツールです。</p>
      <div class="related-list">
        <a class="related-item" href="../survival-fund/">
          <span class="related-badge">計算</span>
          <span class="related-name">生活防衛資金シミュレーター</span>
          <span class="related-status">→</span>
        </a>
        <a class="related-item" href="../../work/independence/">
          <span class="related-badge">診断ツール</span>
          <span class="related-name">独立準備チェック</span>
          <span class="related-status">→</span>
        </a>
      </div>
    </section>

    <p class="bookmark-tip">このページをブックマークしておくと、次回もすぐ使えます。</p>
  </div>

  <script src="/shared-history.js"></script>
  <script src="script.js"></script>
</body>
</html>
