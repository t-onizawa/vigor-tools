<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="目標までの差額と残り月数から、毎月いくら貯めればいいかを計算する。判定はせず、数字だけを返すツール。">
  <title>独立準備の貯金ペース計算 — VIGOR TOOLS</title>
  <link rel="stylesheet" href="../../shared.css">
  <link rel="stylesheet" href="style.css">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="VIGOR TOOLS">
  <meta property="og:title" content="独立準備の貯金ペース計算 — VIGOR TOOLS">
  <meta property="og:description" content="目標までの差額と残り月数から、毎月いくら貯めればいいかを計算する。判定はせず、数字だけを返すツール。">
  <meta property="og:url" content="https://vigorlab.net/money/savings-pace/">
  <meta property="og:image" content="https://vigorlab.net/assets/brand/og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="独立準備の貯金ペース計算 — VIGOR TOOLS">
  <meta name="twitter:description" content="目標までの差額と残り月数から、毎月いくら貯めればいいかを計算する。判定はせず、数字だけを返すツール。">
  <meta name="twitter:image" content="https://vigorlab.net/assets/brand/og-image.png">
  <link rel="canonical" href="https://vigorlab.net/money/savings-pace/">
  <link rel="icon" href="/assets/brand/favicon.svg" type="image/svg+xml">
  <link rel="alternate icon" href="/assets/brand/favicon.ico">
  <link rel="apple-touch-icon" href="/assets/brand/apple-touch-icon.png">
  <link rel="manifest" href="/assets/brand/site.webmanifest">
</head>
<body>
  <div class="container">
    <nav class="breadcrumb">
      <a href="../../">VIGOR TOOLS</a>
      <span class="sep">›</span>
      <a href="../">お金</a>
      <span class="sep">›</span>
      <span>独立準備の貯金ペース計算</span>
    </nav>

    <header class="page-header">
      <h1>独立準備の貯金ペース計算</h1>
      <p class="page-desc">あといくら、何ヶ月で貯めるかを入れるだけで、毎月の目安が見えます。</p>
    </header>

    <form id="calc-form" novalidate>
      <div class="field-block">
        <label for="gap-amount">目標までの差額（円）</label>
        <input type="number" id="gap-amount" inputmode="numeric" min="0" placeholder="例：1800000">
        <p class="field-hint"><a href="../savings-gap/">退職までに必要な貯金差額計算で確認する →</a></p>
      </div>
      <div class="field-block">
        <label for="months-left">目標までの月数</label>
        <input type="number" id="months-left" inputmode="numeric" min="1" placeholder="例：18">
      </div>
      <p class="form-error" id="form-error" hidden>両方の項目を入力してください。</p>
      <button type="submit" class="btn-check">計算する</button>
    </form>

    <section class="result-section" id="result-section" hidden>
      <div class="total-box">
        <p class="total-label">毎月の貯金目安は</p>
        <p class="total-value"><span id="monthly-pace">0</span>円</p>
      </div>

      <div class="history-save" id="history-save-block">
        <button type="button" class="btn-save-history" id="save-history-btn">この結果を判断履歴に残す</button>
      </div>
      <div class="history-saved" id="history-saved-block" hidden>
        <p class="saved-message">この結果を判断履歴に保存しました。</p>
        <a href="/history/" class="history-link">判断履歴を見る →</a>
      </div>

      <button type="button" class="reset-btn" id="reset-btn">もう一度計算する</button>
    </section>

    <section class="related-tools">
      <h2 class="related-heading">次はこちら</h2>
      <p class="related-sub">今の状況に合わせて、次に使えるツールです。</p>
      <div class="related-list">
        <a class="related-item" href="../savings-gap/">
          <span class="related-badge">計算</span>
          <span class="related-name">退職までに必要な貯金差額計算</span>
          <span class="related-status">→</span>
        </a>
        <a class="related-item" href="../fixed-cost-check/">
          <span class="related-badge">チェックリスト</span>
          <span class="related-name">固定費チェック</span>
          <span class="related-status">→</span>
        </a>
      </div>
    </section>

    <p class="bookmark-tip">このページをブックマークしておくと、次回もすぐ使えます。</p>
  </div>

  <script src="/shared-history.js"></script>
  <script src="script.js"></script>
</body>
</html>
