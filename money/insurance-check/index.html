<body>
  <div class="container">
    <nav class="breadcrumb">
      <a href="../../">VIGOR TOOLS</a>
      <span class="sep">›</span>
      <a href="../">お金</a>
      <span class="sep">›</span>
      <span>保険の入りすぎチェック</span>
    </nav>

    <header class="page-header">
      <h1>保険の入りすぎチェック</h1>
      <p>保険料が今の生活に合っているか、確認しておきたいことをまとめました。</p>
    </header>

    <div class="progress-bar">
      <div class="progress-text">0 / 9 確認済み</div>
      <div class="bar-bg"><div class="bar-fill"></div></div>
    </div>
    <div class="result incomplete">まず加入状況を書き出すところから始めましょう。</div>

    <section class="section">
      <h2 class="section-title">1. 加入状況の把握</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 加入している保険の一覧を書き出した</label></li>
        <li><label><input type="checkbox"> 月々の保険料合計を把握している</label></li>
        <li><label><input type="checkbox"> 各保険の保障内容をざっくり説明できる</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">2. 保障内容の重複</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 生命保険と医療保険で保障が重複していないか確認した</label></li>
        <li><label><input type="checkbox"> 会社の福利厚生（団体保険等）と重複していないか確認した</label></li>
        <li><label><input type="checkbox"> 複数の保険会社で似た保障に入っていないか確認した</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">3. 保険料の妥当性</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 保険料が月収に対して高すぎないか考えた</label></li>
        <li><label><input type="checkbox"> 直近で保険を見直した時期を思い出せる</label></li>
        <li><label><input type="checkbox"> ライフステージの変化（結婚・独立等）を保険に反映できているか考えた</label></li>
      </ul>
    </section>

    <button class="reset-btn">チェックをリセット</button>

    <section class="related-tools">
      <h2 class="related-heading">次はこちら</h2>
      <p class="related-sub">今の状況に合わせて、次に使えるツールです。</p>
      <div class="related-list">
        <a class="related-item" href="../fixed-cost-check/">
          <span class="related-badge">チェックリスト</span>
          <span class="related-name">固定費チェック</span>

        </a>

          <span class="related-name">サブスク年間総額計算</span>
          <span class="related-status">→</span>
        </a>
      </div>
    </section>

    <p class="bookmark-tip">このページをブックマークしておくと、次回もすぐ使えます。</p>
  </div>
