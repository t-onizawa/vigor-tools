<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="目標の貯蓄額と今の貯蓄額から、あといくら必要かを計算する。判定はせず、差額だけを返すシンプルな計算ツール。">

  <link rel="stylesheet" href="style.css">

  <meta property="og:site_name" content="VIGOR TOOLS">
  <meta property="og:title" content="退職までに必要な貯金差額計算 — VIGOR TOOLS">
  <meta property="og:description" content="目標の貯蓄額と今の貯蓄額から、あといくら必要かを計算する。判定はせず、差額だけを返すシンプルな計算ツール。">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="退職までに必要な貯金差額計算 — VIGOR TOOLS">
  <meta name="twitter:description" content="目標の貯蓄額と今の貯蓄額から、あといくら必要かを計算する。判定はせず、差額だけを返すシンプルな計算ツール。">
  <meta name="twitter:image" content="https://vigorlab.net/assets/brand/og-image.png">
  <link rel="canonical" href="https://vigorlab.net/money/savings-gap/">
  <link rel="icon" href="/assets/brand/favicon.svg" type="image/svg+xml">
  <link rel="alternate icon" href="/assets/brand/favicon.ico">
  <link rel="apple-touch-icon" href="/assets/brand/apple-touch-icon.png">
  <link rel="manifest" href="/assets/brand/site.webmanifest">
</head>
<body>
  <div class="container">
    <nav class="breadcrumb">
      <a href="../../">VIGOR TOOLS</a>
      <span class="sep">›</span>
      <a href="../">お金</a>
      <span class="sep">›</span>
      <span>退職までに必要な貯金差額計算</span>
    </nav>

    <header class="page-header">
      <h1>退職までに必要な貯金差額計算</h1>
      <p class="page-desc">目標額と今の貯蓄額の差を計算するだけです。</p>
    </header>

    <form id="calc-form" novalidate>
      <div class="field-block">
        <label for="target-savings">目標の貯蓄額（円）</label>
        <input type="number" id="target-savings" inputmode="numeric" min="0" placeholder="例：3000000">
        <p class="field-hint"><a href="../survival-fund/">生活防衛資金シミュレーターで目安を確認する →</a></p>
      </div>
      <div class="field-block">
        <label for="current-savings">今の貯蓄額（円）</label>
        <input type="number" id="current-savings" inputmode="numeric" min="0" placeholder="例：1200000">
      </div>
      <p class="form-error" id="form-error" hidden>両方の項目を入力してください。</p>
      <button type="submit" class="btn-check">計算する</button>
    </form>

    <section class="result-section" id="result-section" hidden>
      <div class="total-box">
        <p class="total-label" id="result-label">あと必要な金額は</p>
        <p class="total-value"><span id="gap-amount">0</span>円</p>
      </div>

      <div class="history-save" id="history-save-block">
        <button type="button" class="btn-save-history" id="save-history-btn">この結果を判断履歴に残す</button>
      </div>
      <div class="history-saved" id="history-saved-block" hidden>
        <p class="saved-message">この結果を判断履歴に保存しました。</p>
        <a href="/history/" class="history-link">判断履歴を見る →</a>
      </div>

      <button type="button" class="reset-btn" id="reset-btn">もう一度計算する</button>
    </section>

    <section class="related-tools">
      <h2 class="related-heading">次はこちら</h2>
      <p class="related-sub">今の状況に合わせて、次に使えるツールです。</p>
      <div class="related-list">
        <a class="related-item" href="../savings-pace/">
          <span class="related-badge">計算</span>
          <span class="related-name">独立準備の貯金ペース計算</span>
          <span class="related-status">→</span>
        </a>
        <a class="related-item" href="../survival-fund/">
          <span class="related-badge">計算</span>
          <span class="related-name">生活防衛資金シミュレーター</span>
          <span class="related-status">→</span>
        </a>
      </div>
    </section>

    <p class="bookmark-tip">このページをブックマークしておくと、次回もすぐ使えます。</p>
  </div>

  <script src="/shared-history.js"></script>
  <script src="script.js"></script>
</body>
</html>
