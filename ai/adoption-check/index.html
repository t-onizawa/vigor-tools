<body>
  <div class="container">
    <nav class="breadcrumb">
      <a href="../../">VIGOR TOOLS</a>
      <span class="sep">›</span>
      <a href="../">AI活用</a>
      <span class="sep">›</span>
      <span>AI導入前チェック</span>
    </nav>

    <header class="page-header">
      <h1>AI導入前チェック</h1>
      <p>新しいAIツールを使い始める前に、確認しておきたいことをまとめました。</p>
    </header>

    <div class="progress-bar">
      <div class="progress-text">0 / 8 確認済み</div>
      <div class="bar-bg"><div class="bar-fill"></div></div>
    </div>
    <div class="result incomplete">まず目的を明確にするところから始めましょう。</div>

    <section class="section">
      <h2 class="section-title">1. 目的</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 何のために導入するか明確にしている</label></li>
        <li><label><input type="checkbox"> 既存ツールで代替できないか検討した</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">2. セキュリティ・情報</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 入力データが学習に使われるか確認した</label></li>
        <li><label><input type="checkbox"> 社外秘情報を入力しない運用ルールを決めた</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">3. コスト</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 無料枠でどこまでできるか確認した</label></li>
        <li><label><input type="checkbox"> 月額が業務効果に見合うか考えた</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">4. 運用</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 誰が使うか決めた</label></li>
        <li><label><input type="checkbox"> うまくいかなかった場合の撤退基準を考えた</label></li>
      </ul>
    </section>

    <button class="reset-btn">チェックをリセット</button>

    <section class="related-tools">
      <h2 class="related-heading">次はこちら</h2>
      <p class="related-sub">今の状況に合わせて、次に使えるツールです。</p>
      <div class="related-list">
        <a class="related-item" href="../ai-cost-check/">
          <span class="related-badge">計算</span>
          <span class="related-name">AI利用料、元取れてる？計算</span>
          <span class="related-status">→</span>
        </a>
        <a class="related-item" href="../task-sort/">
          <span class="related-badge">思考ツール</span>
          <span class="related-name">AI作業仕分けシート</span>
          <span class="related-status">→</span>
        </a>
      </div>
    </section>

    <p class="bookmark-tip">このページをブックマークしておくと、次回もすぐ使えます。</p>
  </div>
  <script src="script.js"></script>
