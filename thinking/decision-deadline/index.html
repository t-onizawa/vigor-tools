<body>
  <div class="container">
    <nav class="breadcrumb">
      <a href="../../">VIGOR TOOLS</a>
      <span class="sep">›</span>
      <a href="../">思考整理</a>
      <span class="sep">›</span>
      <span>決断期限メモ</span>

    <header class="page-header">
      <h1>決断期限メモ</h1>
      <p class="page-desc">「いつまでに決めるか」を決めるだけで、考え続けることが減ります。</p>
    </header>

    <div class="field-block">
      <label for="topic">今、迷っていること</label>
      <textarea id="topic" rows="3" placeholder="例：転職エージェントに登録するかどうか"></textarea>
    </div>
    <div class="field-block">
      <label for="deadline">いつまでに決めるか</label>
      <input type="text" id="deadline" placeholder="例：今月末、来週の日曜日">
    </div>
    <div class="field-block">
      <label for="memo">今の気持ち・メモ（任意）</label>
      <textarea id="memo" rows="3" placeholder="今考えていることを、そのまま書いてかまいません"></textarea>
    </div>

    <p class="auto-save-note">入力内容は、このブラウザに自動で保存されます。</p>

    <div class="history-save" id="history-save-block" hidden>
      <button type="button" class="btn-save-history" id="save-history-btn">この内容を判断履歴に残す</button>
    </div>
    <div class="history-saved" id="history-saved-block" hidden>
      <p class="saved-message">この内容を判断履歴に保存しました。</p>
      <a href="/history/" class="history-link">判断履歴を見る →</a>
    </div>

    <section class="related-tools">
      <h2 class="related-heading">次はこちら</h2>
      <p class="related-sub">今の状況に合わせて、次に使えるツールです。</p>
      <div class="related-list">
        <a class="related-item" href="../options-compare/">
          <span class="related-badge">比較シート</span>
          <span class="related-name">迷っている選択肢の比較シート</span>
          <span class="related-status">→</span>
        </a>
        <a class="related-item" href="../../thinking/15min-do/">
          <span class="related-badge">思考ツール</span>
          <span class="related-name">15分Do変換ツール</span>
          <span class="related-status">→</span>
        </a>
      </div>
    </section>

    <p class="bookmark-tip">期限が来たら、また開いて見直してみてください。</p>
  </div>

  <script src="/shared-history.js"></script>
  <script src="script.js"></script>
