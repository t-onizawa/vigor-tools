  <link rel="stylesheet" href="style.css">

  <meta property="og:image" content="https://vigorlab.net/assets/brand/og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="やらないことリスト — VIGOR TOOLS">
  <meta name="twitter:description" content="何かを増やす前に、何をやめるか書き出す。判定はせず、手放すことを整理するだけのシンプルなツール。">
  <meta name="twitter:image" content="https://vigorlab.net/assets/brand/og-image.png">
  <link rel="canonical" href="https://vigorlab.net/thinking/not-to-do/">
  <link rel="icon" href="/assets/brand/favicon.svg" type="image/svg+xml">

<body>
  <div class="container">
    <nav class="breadcrumb">
      <a href="../../">VIGOR TOOLS</a>
      <span class="sep">›</span>
      <a href="../">思考整理</a>
      <span class="sep">›</span>
      <span>やらないことリスト</span>
    </nav>

    <header class="page-header">
      <h1>やらないことリスト</h1>
      <p class="page-desc">増やす前に、減らす。今、手放したいことを書き出すだけです。</p>
    </header>

    <div class="field-block">
      <label for="not-to-do">やめること・手放すこと</label>
      <textarea id="not-to-do" rows="8" placeholder="例：&#10;毎日SNSを何度もチェックする&#10;頼まれてもいない仕事を抱え込む"></textarea>
    </div>

    <p class="auto-save-note">入力内容は、このブラウザに自動で保存されます。</p>

    <div class="history-save" id="history-save-block" hidden>
      <button type="button" class="btn-save-history" id="save-history-btn">この内容を判断履歴に残す</button>
    </div>
    <div class="history-saved" id="history-saved-block" hidden>
      <p class="saved-message">この内容を判断履歴に保存しました。</p>
      <a href="/history/" class="history-link">判断履歴を見る →</a>
    </div>

    <section class="related-tools">
      <h2 class="related-heading">次はこちら</h2>
      <p class="related-sub">今の状況に合わせて、次に使えるツールです。</p>
      <div class="related-list">
        <a class="related-item" href="../15min-do/">
          <span class="related-badge">思考ツール</span>
          <span class="related-name">15分Do変換ツール</span>
          <span class="related-status">→</span>
        </a>
        <a class="related-item" href="../dcap/">
          <span class="related-badge">思考ツール</span>
          <span class="related-name">DCAp アジャイルシート</span>
          <span class="related-status">→</span>
        </a>
      </div>
    </section>

    <p class="bookmark-tip">気持ちが変わるたびに、書き直してかまいません。</p>
  </div>

  <script src="/shared-history.js"></script>
  <script src="script.js"></script>
</body>
</html>
