<body>
  <div class="container">
    <nav class="breadcrumb">
      <a href="../../">VIGOR TOOLS</a>
      <span class="sep">›</span>
      <a href="../">思考整理</a>
      <span class="sep">›</span>
      <span>決断前の確認シート</span>
    </nav>

    <header class="page-header">
      <h1>決断前の確認シート</h1>
      <p>どんな決断にも使える、確認しておきたいことのリストです。</p>
    </header>

    <div class="progress-bar">
      <div class="progress-text">0 / 6 確認済み</div>
      <div class="bar-bg"><div class="bar-fill"></div></div>
    </div>
    <div class="result incomplete">まず1つずつ確認してみましょう。</div>

    <section class="section">
      <h2 class="section-title">1. 状況の整理</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 今、何を決めようとしているか一文で言える</label></li>
        <li><label><input type="checkbox"> 決めなかった場合どうなるか考えた</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">2. 判断材料</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 必要な情報は一通り集めた</label></li>
        <li><label><input type="checkbox"> 誰かに相談する必要があるか考えた</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">3. 決めた後</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 決めた後、最初にやることが分かる</label></li>
        <li><label><input type="checkbox"> 決めたことを、後から見直せる形で残せる</label></li>
      </ul>
    </section>

    <button class="reset-btn">チェックをリセット</button>

    <section class="related-tools">
      <h2 class="related-heading">次はこちら</h2>
      <p class="related-sub">今の状況に合わせて、次に使えるツールです。</p>
      <div class="related-list">
        <a class="related-item" href="../options-compare/">
          <span class="related-badge">比較シート</span>
          <span class="related-name">迷っている選択肢の比較シート</span>
          <span class="related-status">→</span>
        </a>
        <a class="related-item" href="../decision-deadline/">
          <span class="related-badge">テンプレート</span>
          <span class="related-name">決断期限メモ</span>
          <span class="related-status">→</span>
        </a>
      </div>
    </section>

    <p class="bookmark-tip">このページをブックマークしておくと、次回もすぐ使えます。</p>
  </div>
