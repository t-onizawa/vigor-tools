<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="style.css">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="VIGOR TOOLS">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="仕事の優先順位整理シート — VIGOR TOOLS">
  <meta name="twitter:description" content="抱えている仕事を書き出し、優先順位を自分の言葉で整理する。判定はせず、書き出すだけのシート。">

<body>
  <div class="container">
    <nav class="breadcrumb">
      <a href="../../">VIGOR TOOLS</a>
      <span class="sep">›</span>
      <a href="../">仕事</a>
      <span class="sep">›</span>
      <span>仕事の優先順位整理シート</span>
    </nav>

    <header class="page-header">
      <h1>仕事の優先順位整理シート</h1>
      <p class="page-desc">抱えている仕事を、上から順に書き出すだけです。</p>
    </header>

    <div class="field-block">
      <label for="tasks">今抱えている仕事（優先順に）</label>
      <textarea id="tasks" rows="8" placeholder="例：&#10;1. 明日締切の資料作成&#10;2. 来週の会議準備&#10;3. 溜まっているメール返信"></textarea>
    </div>

    <p class="auto-save-note">入力内容は、このブラウザに自動で保存されます。</p>

    <div class="history-save" id="history-save-block" hidden>
      <button type="button" class="btn-save-history" id="save-history-btn">この内容を判断履歴に残す</button>
    </div>
    <div class="history-saved" id="history-saved-block" hidden>
      <p class="saved-message">この内容を判断履歴に保存しました。</p>
      <a href="/history/" class="history-link">判断履歴を見る →</a>
    </div>

    <section class="related-tools">
      <h2 class="related-heading">次はこちら</h2>
      <p class="related-sub">今の状況に合わせて、次に使えるツールです。</p>
      <div class="related-list">
        <a class="related-item" href="../../thinking/15min-do/">
          <span class="related-badge">思考ツール</span>
          <span class="related-name">15分Do変換ツール</span>
          <span class="related-status">→</span>
        </a>
        <a class="related-item" href="../meeting-check/">
          <span class="related-badge">チェックリスト</span>
          <span class="related-name">会議で確認すべきこと整理シート</span>
          <span class="related-status">→</span>
        </a>
      </div>
    </section>

    <p class="bookmark-tip">朝いちばんに開くと、1日の見通しが立てやすくなります。</p>
  </div>

  <script src="/shared-history.js"></script>
  <script src="script.js"></script>
</body>
</html>
