<body>
  <div class="container">
    <nav class="breadcrumb">
      <a href="../../">VIGOR TOOLS</a>
      <span class="sep">›</span>
      <a href="../">仕事</a>
      <span class="sep">›</span>
      <span>転職チェック</span>
    </nav>

    <header class="page-header">
      <h1>転職チェック</h1>
      <p>転職していいか迷ったとき、確認しておきたいことをまとめました。</p>
    </header>

    <div class="progress-bar">
      <div class="progress-text">0 / 12 確認済み</div>
      <div class="bar-bg"><div class="bar-fill"></div></div>
    </div>
    <div class="result incomplete">まず転職理由を整理するところから始めましょう。</div>

    <section class="section">
      <h2 class="section-title">1. 転職理由</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 今の不満が「環境」なのか「仕事内容」なのか整理した</label></li>
        <li><label><input type="checkbox"> 転職で本当に解決するか考えた</label></li>
        <li><label><input type="checkbox"> 転職以外の選択肢（異動・副業等）も考えた</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">2. 市場価値</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 自分のスキル・経験の市場価値を調べた</label></li>
        <li><label><input type="checkbox"> 同業界の給与相場を確認した</label></li>
        <li><label><input type="checkbox"> 職務経歴を言語化できる</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">3. 生活への影響</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 収入が下がる可能性を許容できるか考えた</label></li>
        <li><label><input type="checkbox"> 家族への影響を話し合った</label></li>
        <li><label><input type="checkbox"> 転職活動にかかる期間を見積もった</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">4. 転職活動の準備</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 職務経歴書の下書きを始めた</label></li>
        <li><label><input type="checkbox"> 転職エージェント・求人サイトを1つ調べた</label></li>
        <li><label><input type="checkbox"> 在職中に転職活動する場合のスケジュールを考えた</label></li>
      </ul>
    </section>

    <button class="reset-btn">チェックをリセット</button>

    <section class="related-tools">
      <h2 class="related-heading">次はこちら</h2>
      <p class="related-sub">今の状況に合わせて、次に使えるツールです。</p>
      <div class="related-list">
        <a class="related-item" href="../stay-or-leave/">
          <span class="related-badge">比較シート</span>
          <span class="related-name">続ける理由 vs 辞めたい理由 比較シート</span>
          <span class="related-status">→</span>
        </a>
        <a class="related-item" href="../resignation-check/">
          <span class="related-badge">チェックリスト</span>
          <span class="related-name">退職チェック</span>
          <span class="related-status">→</span>
        </a>
      </div>
    </section>

    <p class="bookmark-tip">このページをブックマークしておくと、次回もすぐ使えます。</p>
  </div>

</body>
