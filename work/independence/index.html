<body>
  <div class="container">

    <nav class="breadcrumb">
      <a href="../../">VIGOR TOOLS</a>
      <span class="sep">›</span>
      <a href="../">仕事</a>
      <span class="sep">›</span>
      <span>独立準備チェック</span>
    </nav>

    <header class="header">
      <h1>独立準備チェック</h1>
      <p>会社に頼らない場所を作るための、今の自分の現在地を確認する</p>
    </header>

    <div class="progress-bar">
      <div class="progress-text">0 / 25 確認済み</div>
      <div class="bar-bg"><div class="bar-fill"></div></div>
    </div>

    <div class="score-note">チェックが多いほど、準備が整っています。全部揃っていなくて大丈夫。今の現在地を把握するためのツールです。</div>

    <section class="section">
      <h2 class="section-title">1. 財務基盤</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 生活費6ヶ月分以上の貯蓄がある</label></li>
        <li><label><input type="checkbox"> 毎月の固定費を正確に把握している</label></li>
        <li><label><input type="checkbox"> 収入がゼロになっても何ヶ月生きられるか計算した</label></li>
        <li><label><input type="checkbox"> 副収入・案件収入の実績が1件以上ある</label></li>
        <li><label><input type="checkbox"> 月収の目標金額を具体的に決めている</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">2. スキル・提供価値</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 自分が提供できるサービス・仕事を一言で説明できる</label></li>
        <li><label><input type="checkbox"> 誰の、どんな悩みを解決できるか具体的に言える</label></li>
        <li><label><input type="checkbox"> 同じサービスを提供している人と自分を比較できる</label></li>
        <li><label><input type="checkbox"> 過去の実績・成果物を3つ以上見せられる</label></li>
        <li><label><input type="checkbox"> 適正な料金・単価の相場を調べた</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">3. 顧客・人脈</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 最初の顧客になりうる人が3人以上いる</label></li>
        <li><label><input type="checkbox"> 紹介してくれそうな知人・元同僚がいる</label></li>
        <li><label><input type="checkbox"> SNS・ブログなど発信の場がある</label></li>
        <li><label><input type="checkbox"> 月1件以上の相談・問い合わせを受けたことがある</label></li>
        <li><label><input type="checkbox"> 自分の仕事を知っている社外の人が5人以上いる</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">4. 法務・行政</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 開業届・法人設立の違いを調べた</label></li>
        <li><label><input type="checkbox"> 青色申告・経費の基礎知識を理解している</label></li>
        <li><label><input type="checkbox"> 国民健康保険・国民年金への移行を把握している</label></li>
        <li><label><input type="checkbox"> 請求書・契約書の書き方を知っている</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">5. メンタル・環境</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 独立の意思を配偶者・家族に話した</label></li>
        <li><label><input type="checkbox"> うまくいかない場合の「最悪の想定」を考えた</label></li>
        <li><label><input type="checkbox"> 孤独な作業環境でも継続できる自信がある</label></li>
        <li><label><input type="checkbox"> 独立後の1日の過ごし方をイメージできる</label></li>
        <li><label><input type="checkbox"> 「なぜ独立したいか」を自分の言葉で説明できる</label></li>
        <li><label><input type="checkbox"> 独立を応援してくれる人が1人以上いる</label></li>
      </ul>
    </section>

    <div class="result incomplete">あと 25 項目を確認してください</div>
    <button class="reset-btn">リセット</button>

    <section class="related-tools">
      <h2 class="related-heading">関連ツール</h2>
      <div class="related-list">
        <a class="related-item" href="../resignation-check/">
          <span class="related-badge">チェックリスト</span>
          <span class="related-name">退職チェック</span>
          <span class="related-status">→</span>
        </a>

          <span class="related-badge">チェックリスト</span>
          <span class="related-name">固定費チェック</span>
          <span class="related-status">→</span>
        </a>
        <a class="related-item" href="../../thinking/15min-do/">
          <span class="related-badge">思考ツール</span>
          <span class="related-name">15分Do変換ツール</span>
          <span class="related-status">→</span>
        </a>
      </div>
    </section>

    <p class="bookmark-tip">このページをブックマークしておくと、次回もすぐ使えます。</p>

  </div>
