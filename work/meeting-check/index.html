<body>
  <div class="container">
    <nav class="breadcrumb">
      <a href="../../">VIGOR TOOLS</a>
      <span class="sep">›</span>
      <a href="../">仕事</a>
      <span class="sep">›</span>
      <span>会議で確認すべきこと整理シート</span>
    </nav>

    <header class="page-header">
      <h1>会議で確認すべきこと整理シート</h1>
      <p>会議に出る前・出た後に、確認しておきたいことをまとめました。</p>
    </header>

    <div class="progress-bar">
      <div class="progress-text">0 / 6 確認済み</div>
      <div class="bar-bg"><div class="bar-fill"></div></div>
    </div>
    <div class="result incomplete">まず目的の確認から始めましょう。</div>

    <section class="section">
      <h2 class="section-title">1. 事前準備</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 会議の目的・ゴールを把握している</label></li>
        <li><label><input type="checkbox"> 自分が発言すべき論点を整理した</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">2. 会議中に確認すること</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 決定事項を記録する担当を確認した</label></li>
        <li><label><input type="checkbox"> 次のアクションの担当者を明確にした</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">3. 終了後</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 議事録の共有方法を確認した</label></li>
        <li><label><input type="checkbox"> 次回までの自分のタスクを書き出した</label></li>
      </ul>
    </section>

    <button class="reset-btn">チェックをリセット</button>

    <section class="related-tools">
      <h2 class="related-heading">次はこちら</h2>
      <p class="related-sub">今の状況に合わせて、次に使えるツールです。</p>
      <div class="related-list">
        <a class="related-item" href="../priority-sheet/">
          <span class="related-badge">テンプレート</span>
          <span class="related-name">仕事の優先順位整理シート</span>
          <span class="related-status">→</span>
        </a>
        <a class="related-item" href="../request-template/">
          <span class="related-badge">テンプレート</span>
          <span class="related-name">依頼文を明確にするテンプレ</span>
          <span class="related-status">→</span>
        </a>
      </div>
    </section>

    <p class="bookmark-tip">会議の前にいつも開くと、確認漏れが減ります。</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
