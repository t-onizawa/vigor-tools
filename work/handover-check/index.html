<body>
  <div class="container">
    <nav class="breadcrumb">
      <a href="../../">VIGOR TOOLS</a>
      <span class="sep">›</span>
      <a href="../">仕事</a>
      <span class="sep">›</span>
      <span>仕事の引き継ぎ漏れチェック</span>
    </nav>

    <header class="page-header">
      <h1>仕事の引き継ぎ漏れチェック</h1>
      <p>退職・休職・異動・プロジェクト移管、どんな引き継ぎにも使えます。</p>
    </header>

    <div class="progress-bar">
      <div class="progress-text">0 / 9 確認済み</div>
      <div class="bar-bg"><div class="bar-fill"></div></div>
    </div>
    <div class="result incomplete">まず業務内容の書き出しから始めましょう。</div>

    <section class="section">
      <h2 class="section-title">1. 業務内容</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 担当業務を一覧で書き出した</label></li>
        <li><label><input type="checkbox"> 定期的に発生する業務（月次・週次）を明記した</label></li>
        <li><label><input type="checkbox"> 業務の優先順位・締切を伝えた</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">2. データ・アクセス</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 資料の保存場所を共有した</label></li>
        <li><label><input type="checkbox"> 必要なアカウント・権限の引き継ぎ方法を確認した</label></li>
        <li><label><input type="checkbox"> パスワード・鍵などの受け渡し方法を確認した</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">3. 関係者</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 社内外の関係者リストを共有した</label></li>
        <li><label><input type="checkbox"> 関係者への引き継ぎ連絡のタイミングを決めた</label></li>
        <li><label><input type="checkbox"> 引き継ぎ後の問い合わせ窓口を決めた</label></li>
      </ul>
    </section>

    <button class="reset-btn">チェックをリセット</button>

    <section class="related-tools">
      <h2 class="related-heading">次はこちら</h2>
      <p class="related-sub">今の状況に合わせて、次に使えるツールです。</p>

          <span class="related-badge">チェックリスト</span>
          <span class="related-name">退職チェック</span>
          <span class="related-status">→</span>
        </a>
        <a class="related-item" href="../before-quitting-checklist/">
          <span class="related-badge">チェックリスト</span>
          <span class="related-name">会社員のうちにやることリスト</span>
          <span class="related-status">→</span>
        </a>
      </div>
    </section>

    <p class="bookmark-tip">このページをブックマークしておくと、次回もすぐ使えます。</p>
  </div>
