<body>
  <div class="container">
    <nav class="breadcrumb">
      <a href="../../">VIGOR TOOLS</a>
      <span class="sep">›</span>
      <a href="../">仕事</a>
      <span class="sep">›</span>
      <span>退職の伝え方テンプレート</span>
    </nav>

    <header class="page-header">
      <h1>退職の伝え方テンプレート</h1>
      <p class="page-desc">状況に近いものを選ぶと、下の欄に文面が入ります。自分の言葉に直してから使ってください。</p>
    </header>

    <div class="template-buttons">
      <button type="button" class="tpl-btn" data-tpl="family">家庭の事情として伝える</button>
      <button type="button" class="tpl-btn" data-tpl="career">キャリアの都合として伝える</button>
      <button type="button" class="tpl-btn" data-tpl="honest">正直な気持ちを伝える</button>
    </div>

    <div class="field-block">
      <label for="script-text">文面（編集できます）</label>
      <textarea id="script-text" rows="10" placeholder="上のボタンを押すと、ここに文面が入ります"></textarea>
    </div>

    <button type="button" class="btn-copy" id="copy-btn">この文面をコピーする</button>
    <p class="copy-note" id="copy-note" hidden>コピーしました。</p>

    <p class="auto-save-note">入力内容は、このブラウザに自動で保存されます。</p>

    <div class="history-save" id="history-save-block" hidden>
      <button type="button" class="btn-save-history" id="save-history-btn">この内容を判断履歴に残す</button>
    </div>
    <div class="history-saved" id="history-saved-block" hidden>
      <p class="saved-message">この内容を判断履歴に保存しました。</p>
      <a href="/history/" class="history-link">判断履歴を見る →</a>
    </div>

    <section class="related-tools">
      <h2 class="related-heading">次はこちら</h2>
      <p class="related-sub">今の状況に合わせて、次に使えるツールです。</p>
      <div class="related-list">
        <a class="related-item" href="../resignation-check/">
          <span class="related-badge">チェックリスト</span>
          <span class="related-name">退職チェック</span>
          <span class="related-status">→</span>
        </a>
        <a class="related-item" href="../stay-or-leave/">
          <span class="related-badge">比較シート</span>
          <span class="related-name">続ける理由 vs 辞めたい理由 比較シート</span>
          <span class="related-status">→</span>
        </a>
      </div>
    </section>

    <p class="bookmark-tip">伝えるタイミングが来るまで、何度でも書き直してかまいません。</p>
  </div>

  <script src="/shared-history.js"></script>
  <script src="script.js"></script>
