  <link rel="stylesheet" href="style.css">

  <meta name="twitter:description" content="独立後の目標年収から、必要な目標日給を逆算する。判定はせず、数字だけを返す計算ツール。">
  <meta name="twitter:image" content="https://vigorlab.net/assets/brand/og-image.png">
  <link rel="canonical" href="https://vigorlab.net/work/target-daily-rate/">
  <link rel="icon" href="/assets/brand/favicon.svg" type="image/svg+xml">
  <link rel="alternate icon" href="/assets/brand/favicon.ico">

<body>
  <div class="container">
    <nav class="breadcrumb">
      <a href="../../">VIGOR TOOLS</a>
      <span class="sep">›</span>
      <a href="../">仕事</a>
      <span class="sep">›</span>
      <span>独立後の目標日給計算</span>
    </nav>

    <header class="page-header">
      <h1>独立後の目標日給計算</h1>
      <p class="page-desc">目標年収から、1日いくら稼げばいいかを逆算します。</p>
    </header>

    <form id="calc-form" novalidate>
      <div class="field-block">
        <label for="target-income">目標年収（円）</label>
        <input type="number" id="target-income" inputmode="numeric" min="0" placeholder="例：5000000">
      </div>
      <div class="field-block">
        <label for="working-days">年間稼働日数（日）</label>
        <input type="number" id="working-days" inputmode="numeric" min="1" placeholder="例：200">
        <p class="field-hint">目安：週5日×年間40週=200日程度</p>
      </div>
      <p class="form-error" id="form-error" hidden>目標年収と年間稼働日数を入力してください。</p>
      <button type="submit" class="btn-check">計算する</button>
    </form>

    <section class="result-section" id="result-section" hidden>
      <div class="total-box">
        <p class="total-label">目標日給は</p>
        <p class="total-value"><span id="daily-rate">0</span>円/日</p>
        <p class="total-sub" id="hourly-rate-note"></p>
      </div>

      <p class="disclaimer">※税金・社会保険料・経費は考慮していない概算です。</p>

      <div class="history-save" id="history-save-block">
        <button type="button" class="btn-save-history" id="save-history-btn">この結果を判断履歴に残す</button>
      </div>
      <div class="history-saved" id="history-saved-block" hidden>
        <p class="saved-message">この結果を判断履歴に保存しました。</p>
        <a href="/history/" class="history-link">判断履歴を見る →</a>
      </div>

      <button type="button" class="reset-btn" id="reset-btn">もう一度計算する</button>
    </section>

    <section class="related-tools">
      <h2 class="related-heading">次はこちら</h2>
      <p class="related-sub">今の状況に合わせて、次に使えるツールです。</p>
      <div class="related-list">
        <a class="related-item" href="../independence/">
          <span class="related-badge">診断ツール</span>
          <span class="related-name">独立準備チェック</span>
          <span class="related-status">→</span>
        </a>
        <a class="related-item" href="../../money/survival-fund/">
          <span class="related-badge">計算</span>
          <span class="related-name">生活防衛資金シミュレーター</span>
          <span class="related-status">→</span>
        </a>
      </div>
    </section>

    <p class="bookmark-tip">このページをブックマークしておくと、次回もすぐ使えます。</p>
  </div>

  <script src="/shared-history.js"></script>
  <script src="script.js"></script>
</body>
</html>
