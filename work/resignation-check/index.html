<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>退職チェック — VIGOR TOOLS</title>
  <link rel="stylesheet" href="../../shared.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">

    <nav class="breadcrumb">
      <a href="../../">VIGOR TOOLS</a>
      <span> › </span>
      <a href="../">仕事</a>
      <span> › </span>
      <span>退職チェック</span>
    </nav>

    <header class="page-header">
      <h1>退職チェック</h1>
      <p class="page-desc">退職前にこれだけは確認しておく。確認漏れを減らすための最小チェックリストです。</p>
    </header>

    <div class="progress-bar">
      <div class="bar-fill"></div>
    </div>
    <p class="progress-text">0 / 21 確認済み</p>
    <div class="result incomplete">確認すべき項目があります。一つずつ確認してみましょう。</div>

    <section class="section">
      <h2 class="section-title">お金</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 最終給与の支給日を確認した</label></li>
        <li><label><input type="checkbox"> 退職金の有無・金額を確認した</label></li>
        <li><label><input type="checkbox"> 住民税の支払い方法を確認した</label></li>
        <li><label><input type="checkbox"> 退職後の生活費（当面の蓄え）を確認した</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">退職日・有給</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 退職希望日を決めた</label></li>
        <li><label><input type="checkbox"> 有給残日数を確認した</label></li>
        <li><label><input type="checkbox"> 最終出社日を確認した</label></li>
        <li><label><input type="checkbox"> 退職届・退職願の提出方法・期限を確認した</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">引き継ぎ</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 担当業務を書き出した</label></li>
        <li><label><input type="checkbox"> 引き継ぎ資料を作成した</label></li>
        <li><label><input type="checkbox"> 関係者への共有範囲・タイミングを確認した</label></li>
        <li><label><input type="checkbox"> 貸与物・アカウントを整理した</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">社会保険・年金</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 健康保険の切り替え方法を確認した</label></li>
        <li><label><input type="checkbox"> 年金の切り替えを確認した</label></li>
        <li><label><input type="checkbox"> 雇用保険・離職票の受け取りを確認した</label></li>
        <li><label><input type="checkbox"> 源泉徴収票の受け取りを確認した</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">会社に返すもの</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 社員証を返却した（または返却日を確認した）</label></li>
        <li><label><input type="checkbox"> PC・スマホを返却した（または返却日を確認した）</label></li>
        <li><label><input type="checkbox"> 入館証を返却した</label></li>
        <li><label><input type="checkbox"> 名刺を返却・処分した</label></li>
        <li><label><input type="checkbox"> 書類・資料を返却・整理した</label></li>
      </ul>
    </section>

    <p class="tool-note">※ 最終判断は勤務先の就業規則・人事担当・専門家にご確認ください。</p>

    <button class="reset-btn">チェックをリセット</button>

    <section class="related-tools">
      <h2 class="related-heading">関連ツール</h2>
      <div class="related-list">
        <a class="related-item" href="../independence/">
          <span class="related-badge">診断ツール</span>
          <span class="related-name">独立準備チェック</span>
          <span class="related-status">→</span>
        </a>
        <a class="related-item" href="../../money/fixed-cost-check/">
          <span class="related-badge">チェックリスト</span>
          <span class="related-name">固定費チェック</span>
          <span class="related-status">→</span>
        </a>
        <a class="related-item" href="../../thinking/15min-do/">
          <span class="related-badge">思考ツール</span>
          <span class="related-name">15分Do変換ツール</span>
          <span class="related-status">→</span>
        </a>
      </div>
    </section>

    <p class="bookmark-tip">退職準備は一度では終わりません。このページをブックマークして、段階的に確認しましょう。</p>

  </div>
  <script src="script.js"></script>
</body>
</html>
