<body>
  <div class="container">
    <nav class="breadcrumb">
      <a href="../../">VIGOR TOOLS</a>
      <span class="sep">›</span>
      <a href="../">仕事</a>
      <span class="sep">›</span>
      <span>副業に使える時間から月収目標を逆算</span>
    </nav>

    <header class="page-header">
      <h1>副業に使える時間から月収目標を逆算</h1>
      <p class="page-desc">使える時間と時間単価から、現実的な月収目標が見えます。</p>
    </header>

    <form id="calc-form" novalidate>
      <div class="field-block">
        <label for="hours-per-week">週に使える時間（時間）</label>
        <input type="number" id="hours-per-week" inputmode="numeric" min="0" placeholder="例：8">
      </div>
      <div class="field-block">
        <label for="hourly-rate">想定の時間単価（円）</label>
        <input type="number" id="hourly-rate" inputmode="numeric" min="0" placeholder="例：3000">
      </div>
      <p class="form-error" id="form-error" hidden>両方の項目を入力してください。</p>
      <button type="submit" class="btn-check">計算する</button>
    </form>

    <section class="result-section" id="result-section" hidden>
      <div class="total-box">
        <p class="total-label">現実的な月収目標は</p>
        <p class="total-value"><span id="monthly-income">0</span>円</p>
      </div>

      <p class="disclaimer">※週4.3週で1ヶ月として概算しています。</p>

      <div class="history-save" id="history-save-block">
        <button type="button" class="btn-save-history" id="save-history-btn">この結果を判断履歴に残す</button>
      </div>
      <div class="history-saved" id="history-saved-block" hidden>
        <p class="saved-message">この結果を判断履歴に保存しました。</p>
        <a href="/history/" class="history-link">判断履歴を見る →</a>
      </div>

      <button type="button" class="reset-btn" id="reset-btn">もう一度計算する</button>
    </section>

    <section class="related-tools">
      <h2 class="related-heading">次はこちら</h2>
      <p class="related-sub">今の状況に合わせて、次に使えるツールです。</p>
      <div class="related-list">
        <a class="related-item" href="../side-business-check/">
          <span class="related-badge">診断ツール</span>
          <span class="related-name">副業しどき診断</span>
          <span class="related-status">→</span>
        </a>
        <a class="related-item" href="../../money/side-income-target/">
          <span class="related-badge">計算</span>
          <span class="related-name">副収入の月額目標計算</span>
          <span class="related-status">→</span>
        </a>
      </div>
    </section>

    <p class="bookmark-tip">このページをブックマークしておくと、次回もすぐ使えます。</p>
  </div>

  <script src="/shared-history.js"></script>
