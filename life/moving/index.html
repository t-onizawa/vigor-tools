<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>引越しチェック — VIGOR TOOLS</title>
  <link rel="stylesheet" href="../../shared.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">

    <nav class="breadcrumb">
      <a href="../../">VIGOR TOOLS</a>
      <span class="sep">›</span>
      <a href="../">暮らし</a>
      <span class="sep">›</span>
      <span>引越しチェック</span>
    </nav>

    <header class="header">
      <h1>引越しチェック</h1>
      <p>やることが多い引越しを、漏れなく順番に進める</p>
    </header>

    <div class="progress-bar">
      <div class="progress-text">0 / 33 確認済み</div>
      <div class="bar-bg"><div class="bar-fill"></div></div>
    </div>

    <section class="section">
      <h2 class="section-title">1. 退去手続き</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 引越し日を決めた</label></li>
        <li><label><input type="checkbox"> 現在の物件に退去を連絡した（1〜2ヶ月前）</label></li>
        <li><label><input type="checkbox"> 退去立会いの日程を確定した</label></li>
        <li><label><input type="checkbox"> 鍵の返却方法を確認した</label></li>
        <li><label><input type="checkbox"> 原状回復の範囲・費用を確認した</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">2. 新居・引越し業者</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 新居の契約を完了した</label></li>
        <li><label><input type="checkbox"> 入居日・鍵の受け取り方法を確認した</label></li>
        <li><label><input type="checkbox"> 引越し業者に見積もりを依頼した（2〜3社）</label></li>
        <li><label><input type="checkbox"> 引越し日を業者と確定した</label></li>
        <li><label><input type="checkbox"> エレベーター・駐車場の使用許可を取った</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">3. 住所変更</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 役所に転出届を提出した（旧住所）</label></li>
        <li><label><input type="checkbox"> 役所に転入届を提出した（新住所、引越し後14日以内）</label></li>
        <li><label><input type="checkbox"> 運転免許証の住所変更をした</label></li>
        <li><label><input type="checkbox"> 銀行口座の住所変更をした</label></li>
        <li><label><input type="checkbox"> クレジットカードの住所変更をした</label></li>
        <li><label><input type="checkbox"> 保険（生命・医療・自動車等）の住所変更をした</label></li>
        <li><label><input type="checkbox"> 職場に住所変更を連絡した</label></li>
        <li><label><input type="checkbox"> 郵便局に転送届を出した</label></li>
        <li><label><input type="checkbox"> ネット通販・サブスクの住所変更をした</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">4. ライフライン</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 電気の停止・開始手続きをした</label></li>
        <li><label><input type="checkbox"> ガスの停止・開始手続きをした（開通立会いを確認）</label></li>
        <li><label><input type="checkbox"> 水道の停止・開始手続きをした</label></li>
        <li><label><input type="checkbox"> インターネット回線の移転・新規申込をした</label></li>
        <li><label><input type="checkbox"> NHK・新聞等の住所変更または解約をした</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">5. 荷造り・処分</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 不要なものを処分・売却した</label></li>
        <li><label><input type="checkbox"> 大型家具・家電の搬出経路を確認した</label></li>
        <li><label><input type="checkbox"> 段ボール・梱包材を用意した</label></li>
        <li><label><input type="checkbox"> 壊れやすいものを適切に梱包した</label></li>
        <li><label><input type="checkbox"> 荷物に部屋名ラベルを貼った</label></li>
        <li><label><input type="checkbox"> 引越し当日に使うものを別にまとめた</label></li>
      </ul>
    </section>

    <section class="section">
      <h2 class="section-title">6. 新居の準備</h2>
      <ul class="checklist">
        <li><label><input type="checkbox"> 家具・家電の配置を決めた</label></li>
        <li><label><input type="checkbox"> 入居前の掃除・クリーニングをした</label></li>
        <li><label><input type="checkbox"> カーテン・ブラインドを用意した</label></li>
      </ul>
    </section>

    <div class="result incomplete">あと 33 項目を確認してください</div>
    <button class="reset-btn">リセット</button>

    <section class="related-tools">
      <h2 class="related-heading">関連ツール</h2>
      <div class="related-list">
        <div class="related-item related-item--coming">
          <span class="related-badge">チェックリスト</span>
          <span class="related-name">固定費チェック</span>
          <span class="related-status">準備中</span>
        </div>
        <div class="related-item related-item--coming">
          <span class="related-badge">チェックリスト</span>
          <span class="related-name">防災備蓄チェック</span>
          <span class="related-status">準備中</span>
        </div>
      </div>
    </section>

    <p class="bookmark-tip">このページをブックマークしておくと、次回もすぐ使えます。</p>

  </div>
  <script src="script.js"></script>
</body>
</html>
